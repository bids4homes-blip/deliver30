<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Deliver30 — The $30/hr Delivery System</title>
<meta name="description" content="Track your real net hourly rate, check orders before you accept, and plan peak shifts. Built for gig delivery drivers." />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#0e0c0a; --surface:#151210; --card:#1a1714; --border:#2a2520;
    --amber:#e8a04a; --amberSoft:#c47f2e; --amberDim:#7a4e1a;
    --cream:#f0e6d3; --creamDim:#b8a898; --sand:#8a7a68;
    --rust:#c4614a; --rustSoft:#e07a62; --teal:#4a8c8a; --tealSoft:#62aaa8;
    --text:#ede4d8; --muted:#7a6e62;
    --fd:'Playfair Display', Georgia, serif;
    --fb:'DM Sans', 'Helvetica Neue', sans-serif;
    --fm:'DM Mono', 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: var(--fb); -webkit-font-smoothing: antialiased; }
  input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  button { font-family: var(--fb); -webkit-tap-highlight-color: transparent; }
  .app { min-height: 100vh; }
  .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; }
  .sidebar-brand { padding: 28px 24px 24px; border-bottom: 1px solid var(--border); }
  .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
  .sidebar-foot { padding: 20px 24px; border-top: 1px solid var(--border); }
  .main-desktop { margin-left: 220px; min-height: 100vh; }
  .main-inner { max-width: 1100px; margin: 0 auto; padding: 48px 40px; }
  .nav-btn { width: 100%; display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 10px; border: none; cursor: pointer; background: transparent; color: var(--muted); font-size: 14px; font-weight: 400; text-align: left; margin-bottom: 4px; border-left: 3px solid transparent; transition: all 0.15s; }
  .nav-btn .ic { font-size: 16px; }
  .nav-btn.active { background: rgba(232,160,74,0.094); color: var(--amber); font-weight: 600; border-left: 3px solid var(--amber); }
  .topbar { position: fixed; top: 0; left: 0; right: 0; height: 54px; background: rgba(21,18,16,0.94); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; z-index: 100; }
  .main-mobile { padding-top: 54px; padding-bottom: 80px; }
  .main-mobile-inner { padding: 24px 16px; }
  .tabbar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(21,18,16,0.97); backdrop-filter: blur(16px); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0px); }
  .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 2px; border: none; background: transparent; color: var(--muted); cursor: pointer; transition: color 0.15s; }
  .tab-btn .ic { font-size: 19px; margin-bottom: 3px; }
  .tab-btn .lbl { font-size: 9px; font-weight: 400; letter-spacing: 0.02em; }
  .tab-btn.active { color: var(--amber); }
  .tab-btn.active .lbl { font-weight: 700; }
  .tab-underline { width: 18px; height: 2px; background: var(--amber); border-radius: 1px; margin-top: 4px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
  .card.glow { border-color: var(--amberDim); box-shadow: 0 0 40px rgba(232,160,74,0.078); }
  .eyebrow { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--sand); font-weight: 600; margin-bottom: 6px; }
  .bignum { font-family: var(--fd); font-weight: 700; line-height: 1; color: var(--amber); }
  .page-eyebrow { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--sand); font-weight: 600; margin-bottom: 10px; }
  .page-title { font-family: var(--fd); font-size: 32px; font-weight: 700; color: var(--cream); line-height: 1.15; letter-spacing: -0.3px; }
  .page-sub { color: var(--muted); font-size: 14px; margin-top: 8px; line-height: 1.6; }
  .page-head { margin-bottom: 28px; }
  .ninput-shell { display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; transition: border-color 0.15s; }
  .ninput-shell:focus-within { border-color: var(--amber); background: #1e1b17; }
  .ninput-prefix { color: var(--sand); font-family: var(--fm); font-size: 18px; margin-right: 4px; }
  .ninput-shell input { background: transparent; border: none; outline: none; color: var(--cream); font-size: 22px; font-family: var(--fm); font-weight: 500; width: 100%; min-width: 0; -webkit-appearance: none; }
  .divider { height: 1px; background: var(--border); }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .toggle { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 4px; margin-bottom: 20px; }
  .toggle-opt { flex: 1; padding: 10px 12px; border-radius: 9px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; background: transparent; color: var(--muted); font-size: 13px; font-weight: 700; transition: all 0.2s; }
  .toggle-opt .ic { font-size: 15px; }
  .toggle-opt.active { background: var(--amber); color: var(--bg); }
  .ratingbar { display: flex; gap: 3px; margin-top: 8px; }
  .ratingbar .seg { flex: 1; height: 4px; border-radius: 2px; background: var(--border); }
  .primary-btn { width: 100%; padding: 16px 24px; background: linear-gradient(135deg, var(--amberDim), var(--amber)); border: none; border-radius: 14px; color: #0e0c0a; font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .col { display: flex; flex-direction: column; gap: 14px; }
  .row-between { display: flex; justify-content: space-between; align-items: center; }
  .checklist { display: flex; flex-direction: column; gap: 1px; background: var(--border); border-radius: 12px; overflow: hidden; }
  .checklist-item { background: var(--card); padding: 14px 16px; display: flex; gap: 12px; align-items: flex-start; }
  .checklist-box { width: 18px; height: 18px; border-radius: 5px; border: 2px solid var(--amberDim); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; }
  .checklist-box .dot { width: 8px; height: 8px; border-radius: 2px; background: var(--amberDim); }
  .day-btn { flex: 1 1 auto; padding: 11px 4px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; font-weight: 600; transition: all 0.15s; }
  .day-btn.active { border-color: var(--amber); background: rgba(232,160,74,0.094); color: var(--amber); }
</style>
</head>
<body>
<div id="root"></div>

<script>
var C = {
  bg:"#0e0c0a", surface:"#151210", card:"#1a1714", border:"#2a2520",
  amber:"#e8a04a", amberSoft:"#c47f2e", amberDim:"#7a4e1a",
  cream:"#f0e6d3", creamDim:"#b8a898", sand:"#8a7a68",
  rust:"#c4614a", rustSoft:"#e07a62", teal:"#4a8c8a", tealSoft:"#62aaa8",
  text:"#ede4d8", muted:"#7a6e62"
};
var FM = "var(--fm)", FD = "var(--fd)", FB = "var(--fb)";

var NAV = [
  { id:0, label:"Overview",  icon:"\u25C8" },
  { id:1, label:"Orders",    icon:"\u2299" },
  { id:2, label:"Totals",    icon:"\u03A3" },
  { id:3, label:"Schedule",  icon:"\u25F7" },
  { id:4, label:"Expenses",  icon:"\u25CE" },
  { id:5, label:"Calc",      icon:"\u229E" }
];

var TIPS = [
  "Idle time is your biggest enemy \u2014 reposition near restaurants between every drop.",
  "Sit just outside the hotspot. Less competition, same demand.",
  "A bad order doesn't just pay poorly \u2014 it costs you the next good one.",
  "Multi-apping can lift your hourly 30\u201350% by killing dead time.",
  "Friday & Saturday dinner is the best window of the week.",
  "Weekday lunch near office clusters is massively underrated.",
  "Cherry-pick hard. Acceptance rate matters far less than profit per mile."
];

var App = {
  tab: 0,
  mobile: window.innerWidth < 768,
  ov: { gross:"", hours:"", miles:"", fuel:"", orders:"", tipIdx:0,
        scanning:false, scanError:null, imgPreview:null, scanOk:false, scanWarn:null, justLogged:null },
  oc: { isEV:false, mode:"photo", pay:"", miles:"", minutes:"", result:null,
        scanning:false, scanError:null, imgPreview:null },
  sc: { days:[] },
  ex: { isEV:false, mpg:"28", gasPrice:"3.50", kwhPer100:"30", elecPrice:"0.16",
        fastChargePct:"20", fastChargePrice:"0.42", wkMiles:"300" },
  cl: { isEV:false, dph:"3", base:"3.50", tip:"8.00", mpd:"4", peakPay:"0",
        gasP:"3.50", mpg:"28", kwhPer100:"30", elecPrice:"0.16" }
};

function $(id) { return document.getElementById(id); }
function num(v, d) { d = d || 0; var n = parseFloat(v); return isNaN(n) ? d : Math.max(0, n); }
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fitFont(str, base) {
  var len = String(str).length;
  if (len <= 8)  return base;
  if (len <= 11) return Math.round(base * 0.7);
  return Math.round(base * 0.5);
}

function makeICS(title, sh, sm, eh, em, daysOfWeek) {
  function pad(n) { return (n < 10 ? "0" : "") + n; }
  var now = new Date();
  var dt = new Date(now.getFullYear(), now.getMonth(), now.getDate(), sh, sm);
  if (dt < now) dt.setDate(dt.getDate() + 1);
  var endDt = new Date(dt.getFullYear(), dt.getMonth(), dt.getDate(), eh, em);
  if (endDt <= dt) endDt.setDate(endDt.getDate() + 1);
  function fmt(d) { return d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + "T" + pad(d.getHours()) + pad(d.getMinutes()) + "00"; }
  var uid = "deliver30-" + Date.now() + "-" + Math.floor(Math.random()*9999) + "@deliver30";
  var lines = [
    "BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//Deliver30//EN",
    "BEGIN:VEVENT", "UID:" + uid, "DTSTART:" + fmt(dt), "DTEND:" + fmt(endDt),
    "SUMMARY:" + title, "DESCRIPTION:Deliver30 peak earning window",
    "BEGIN:VALARM", "TRIGGER:-PT15M", "ACTION:DISPLAY", "DESCRIPTION:" + title + " starts in 15 min", "END:VALARM"
  ];
  if (daysOfWeek && daysOfWeek.length) lines.push("RRULE:FREQ=WEEKLY;BYDAY=" + daysOfWeek.join(","));
  lines.push("END:VEVENT", "END:VCALENDAR");
  return "data:text/calendar;charset=utf-8," + encodeURIComponent(lines.join("\r\n"));
}
function downloadICS(dataUrl, filename) {
  var a = document.createElement("a");
  a.href = dataUrl; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

var STORAGE_KEY = "deliver30_v1";
function saveState() {
  try {
    var snap = {
      ov: { gross:App.ov.gross, hours:App.ov.hours, miles:App.ov.miles, fuel:App.ov.fuel, orders:App.ov.orders },
      oc: { isEV:App.oc.isEV, mode:App.oc.mode },
      sc: { days:App.sc.days },
      ex: Object.assign({}, App.ex),
      cl: Object.assign({}, App.cl)
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(snap));
  } catch (e) {}
}
function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    var s = JSON.parse(raw);
    if (s.ov) Object.assign(App.ov, s.ov);
    if (s.oc) { App.oc.isEV = !!s.oc.isEV; if (s.oc.mode) App.oc.mode = s.oc.mode; }
    if (s.sc && Array.isArray(s.sc.days)) App.sc.days = s.sc.days;
    if (s.ex) Object.assign(App.ex, s.ex);
    if (s.cl) Object.assign(App.cl, s.cl);
  } catch (e) {}
}
function getByKey(k) { var p = k.split("."); return App[p[0]][p[1]]; }
function setByKey(k, v) { var p = k.split("."); App[p[0]][p[1]] = v; }

var HISTORY_KEY = "deliver30_history_v1";
function loadHistory() {
  try { var raw = localStorage.getItem(HISTORY_KEY); if (!raw) return []; var a = JSON.parse(raw); return Array.isArray(a) ? a : []; }
  catch (e) { return []; }
}
function saveHistory(arr) { try { localStorage.setItem(HISTORY_KEY, JSON.stringify(arr)); } catch (e) {} }
function todayKey() {
  var d = new Date();
  function pad(n) { return (n < 10 ? "0" : "") + n; }
  return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate());
}
function logShift(mode) {
  var o = App.ov;
  var gross = num(o.gross), hours = num(o.hours), miles = num(o.miles), fuel = num(o.fuel), orders = num(o.orders);
  if (!gross && !hours) return false;
  var hist = loadHistory();
  var key = todayKey();
  var existingIdx = -1;
  for (var i = 0; i < hist.length; i++) { if (hist[i].date === key) { existingIdx = i; break; } }

  if (existingIdx === -1) {
    // No entry today — create one.
    hist.push({ date:key, gross:gross, hours:hours, miles:miles, fuel:fuel, orders:orders, ts:Date.now() });
    App.ov.justLogged = "added";
  } else if (mode === "add") {
    // Stack onto today (e.g. second app) — sum the figures.
    var e = hist[existingIdx];
    e.gross += gross; e.hours += hours; e.miles += miles; e.fuel += fuel; e.orders += orders;
    App.ov.justLogged = "stacked";
  } else {
    // Replace today's entry.
    hist[existingIdx] = { date:key, gross:gross, hours:hours, miles:miles, fuel:fuel, orders:orders, ts:Date.now() };
    App.ov.justLogged = "updated";
  }
  saveHistory(hist);
  return true;
}

function hasTodayEntry() {
  var hist = loadHistory();
  var key = todayKey();
  for (var i = 0; i < hist.length; i++) { if (hist[i].date === key) return true; }
  return false;
}
function deleteShift(ts) {
  var hist = loadHistory().filter(function(e) { return e.ts !== ts; });
  saveHistory(hist);
}
function computeTotals() {
  var hist = loadHistory();
  var now = new Date();
  var y = now.getFullYear(), m = now.getMonth(), d = now.getDate();
  var dow = now.getDay();
  var daysSinceMon = (dow + 6) % 7;
  var weekStart = new Date(y, m, d - daysSinceMon);
  var monthStart = new Date(y, m, 1);
  var yearStart = new Date(y, 0, 1);
  function blank() { return { gross:0, hours:0, miles:0, fuel:0, orders:0, days:0 }; }
  var wk = blank(), mo = blank(), yr = blank();
  function add(acc, e) { acc.gross += e.gross; acc.hours += e.hours; acc.miles += e.miles; acc.fuel += e.fuel; acc.orders += e.orders; acc.days += 1; }
  for (var i = 0; i < hist.length; i++) {
    var e = hist[i];
    var parts = e.date.split("-");
    var ed = new Date(parseInt(parts[0],10), parseInt(parts[1],10)-1, parseInt(parts[2],10));
    if (ed >= yearStart)  add(yr, e);
    if (ed >= monthStart) add(mo, e);
    if (ed >= weekStart)  add(wk, e);
  }
  return { week:wk, month:mo, year:yr, history:hist };
}

function pageHead(eyebrow, title, sub) {
  return '<div class="page-head"><div class="page-eyebrow">' + esc(eyebrow) + '</div><h1 class="page-title">' + esc(title) + '</h1>' + (sub ? '<p class="page-sub">' + esc(sub) + '</p>' : '') + '</div>';
}
function ninput(o) {
  return '<div><div class="eyebrow">' + esc(o.label) + '</div><div class="ninput-shell">' + (o.prefix ? '<span class="ninput-prefix">' + o.prefix + '</span>' : '') + '<input type="number" inputmode="decimal" data-key="' + o.key + '" placeholder="' + (o.placeholder || "0") + '" value="' + esc(getByKey(o.key)) + '" /></div></div>';
}
function toggle(o) {
  return '<div class="toggle"><button class="toggle-opt ' + (!o.value ? "active" : "") + '" data-toggle="' + o.key + '" data-val="false"><span class="ic">' + o.leftIcon + '</span>' + esc(o.leftLabel) + '</button><button class="toggle-opt ' + (o.value ? "active" : "") + '" data-toggle="' + o.key + '" data-val="true"><span class="ic">' + o.rightIcon + '</span>' + esc(o.rightLabel) + '</button></div>';
}
function pill(text, color) {
  return '<span class="pill" style="color:' + color + ';background:' + color + '18;border:1px solid ' + color + '33">' + esc(text) + '</span>';
}
function ratingBar(value, color, max) {
  max = max || 10; var segs = "";
  for (var i = 0; i < max; i++) segs += '<div class="seg" style="' + (i < value ? "background:" + color : "") + '"></div>';
  return '<div class="ratingbar">' + segs + '</div>';
}

/* ── OVERVIEW ── */
function Overview() {
  var o = App.ov;
  var g = num(o.gross), h = num(o.hours), m = num(o.miles), f = num(o.fuel), ord = num(o.orders);
  var net = g - f, netHr = h > 0 ? net / h : 0, dpm = m > 0 ? g / m : 0, apo = ord > 0 ? g / ord : 0, oph = h > 0 ? ord / h : 0;
  var tierColor = netHr >= 30 ? C.tealSoft : netHr >= 23 ? C.amber : C.rustSoft;
  var tierLabel = netHr >= 30 ? "Advanced" : netHr >= 23 ? "Intermediate" : "Beginner";
  var pct = Math.max(0, Math.min((netHr / 40) * 100, 100));
  var mob = App.mobile;
  var heroStr = "$" + netHr.toFixed(2);
  var heroSize = fitFont(heroStr, mob ? 56 : 72);
  var hasMiles = m > 0;

  var statData = [
    { label:"$/Mile",    value:hasMiles ? "$" + dpm.toFixed(2) : "\u2014", ok:dpm >= 2, note:hasMiles ? "$2.00 min" : "add miles", dim:!hasMiles },
    { label:"Avg/Order", value:"$" + apo.toFixed(2), ok:apo >= 7,   note:"$7.00 min" },
    { label:"Orders/Hr", value:oph.toFixed(1),        ok:oph >= 2.5, note:"2.5 target" }
  ];
  var stats = statData.map(function(s) {
    return '<div class="card"><div class="eyebrow">' + s.label + '</div><div class="bignum" style="font-size:28px;color:' + (s.dim ? C.muted : (s.ok ? C.tealSoft : C.rustSoft)) + '">' + s.value + '</div><div style="margin-top:6px;font-size:12px;color:' + (s.dim ? C.muted : (s.ok ? C.tealSoft : C.rust)) + '">' + (s.dim ? "" : (s.ok ? "\u2713" : "\u2191") + " ") + s.note + '</div></div>';
  }).join("");

  var dots = TIPS.map(function(_, i) {
    return '<div data-tip="' + i + '" style="width:' + (i === o.tipIdx ? 18 : 6) + 'px;height:6px;border-radius:3px;background:' + (i === o.tipIdx ? C.amber : C.border) + ';cursor:pointer;transition:all 0.3s"></div>';
  }).join("");

  var ovPreview = "";
  var ovScanningNote = o.scanning ? '<div style="margin-top:12px;font-size:13px;color:' + C.muted + ';text-align:center">Reading your earnings total…</div>' : "";
  var ovError = o.scanError ? '<div style="margin-top:14px;font-size:13px;color:' + C.rustSoft + '">' + esc(o.scanError) + '</div>' : "";
  var ovOk = (!o.scanning && !o.scanError && o.scanOk) ?
    (o.scanWarn
      ? '<div style="margin-top:12px;padding:12px 14px;background:' + C.amber + '14;border:1px solid ' + C.amber + '44;border-radius:10px;font-size:13px;color:' + C.amber + ';line-height:1.5">\u26A0 ' + esc(o.scanWarn) + '</div>'
      : '<div style="margin-top:12px;padding:12px 14px;background:' + C.tealSoft + '12;border:1px solid ' + C.tealSoft + '33;border-radius:10px;font-size:13px;color:' + C.tealSoft + ';line-height:1.5">\u2713 Filled in below \u2014 <span style="color:' + C.cream + '">double-check the numbers match your screenshot</span>, then add your miles for the after-fuel view.</div>')
    : "";

  var scanCard =
    '<div class="card" style="margin-bottom:16px">' +
      '<div class="eyebrow" style="margin-bottom:6px">Quick Fill from Screenshot</div>' +
      '<div style="font-size:13px;color:' + C.muted + ';margin-bottom:14px;line-height:1.5">Snap your end-of-day earnings summary from DoorDash, Uber Eats, etc. We\'ll fill in your total and hours. Miles stay optional \u2014 add them for your true after-fuel rate.</div>' +
      ovPreview +
      '<label style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:18px 24px;border-radius:14px;border:1.5px dashed ' + C.amberDim + ';background:' + C.amber + '0c;color:' + (o.scanning ? C.muted : C.amber) + ';font-size:14px;font-weight:700;cursor:' + (o.scanning ? "not-allowed" : "pointer") + ';letter-spacing:0.04em;text-transform:uppercase;box-sizing:border-box">' +
        '<span style="font-size:18px">' + (o.scanning ? "\u23F3" : "\uD83D\uDCF7") + '</span>' +
        (o.scanning ? "Reading\u2026" : (o.imgPreview ? "Scan Another" : "Upload Earnings Screenshot")) +
        '<input type="file" accept="image/*" id="ovScanInput" style="display:none" ' + (o.scanning ? "disabled" : "") + ' />' +
      '</label>' +
      ovScanningNote + ovError + ovOk +
    '</div>';

  var loggedMsg = { added:"Shift logged", updated:"Today replaced", stacked:"Added to today's total" };
  var loggedNote = o.justLogged ? '<div style="margin-top:10px;font-size:13px;color:' + C.tealSoft + ';text-align:center">\u2713 ' + (loggedMsg[o.justLogged] || "Logged") + ' \u2014 view it on the Totals tab</div>' : "";

  var logBtn;
  if (hasTodayEntry()) {
    // Today already logged — offer to stack (another app) or replace.
    logBtn =
      '<div style="margin-bottom:8px;font-size:12px;color:' + C.muted + ';text-align:center;line-height:1.5">You already logged today. Stacking another app? Add it on. Fixing a mistake? Replace it.</div>' +

/* ── ORDER CHECKER ── */
function analyzeValues(p, m, mins, isEV) {
  var minDpm = isEV ? 1.7 : 2.0, skipDpm = isEV ? 1.3 : 1.5;
  var dpm = p / (m || 1);
  var hrlyRate = mins > 0 ? p / (mins / 60) : null;
  var verdict, color, reasons = [], positives = [];
  if (dpm >= minDpm && p >= 7 && m <= 6) { verdict = "Accept"; color = C.tealSoft; }
  else if (dpm >= skipDpm)                { verdict = "Borderline"; color = C.amber; }
  else                                    { verdict = "Decline"; color = C.rustSoft; }
  if (dpm < minDpm)  reasons.push("Below the $" + minDpm.toFixed(2) + "/mile rule" + (isEV ? " (EV)" : ""));
  if (dpm < skipDpm) reasons.push("Under $" + skipDpm.toFixed(2) + "/mile \u2014 hard to justify");
  if (p < 7)         reasons.push("Payout under $7 threshold");
  if (m > 6)         reasons.push("Over 6 miles \u2014 hurts your orders per hour");
  if (hrlyRate !== null && hrlyRate < 30) reasons.push("Only ~$" + hrlyRate.toFixed(0) + "/hr at this pace \u2014 below $30 target");
  if (p >= 10 && m <= 5) positives.push("High-value, short distance \u2014 rare find");
  if (dpm >= minDpm)     positives.push("Meets the $" + minDpm.toFixed(2) + "/mile rule");
  if (hrlyRate !== null && hrlyRate >= 30) positives.push("~$" + hrlyRate.toFixed(0) + "/hr at this pace \u2014 hits your target");
  if (isEV && dpm >= skipDpm && dpm < minDpm) positives.push("EV running costs make this more viable than for gas vehicles");
  return { verdict:verdict, color:color, dpm:dpm, hrlyRate:hrlyRate, reasons:reasons, positives:positives };
}

function resizeImage(file) {
  return new Promise(function(resolve, reject) {
    var img = new Image();
    var reader = new FileReader();
    reader.onload = function() {
      img.onload = function() {
        var maxDim = 1024;
        var w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) { var scale = maxDim / Math.max(w, h); w = Math.round(w*scale); h = Math.round(h*scale); }
        var canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", 0.82));
      };
      img.onerror = function() { reject(new Error("Couldn't load that image")); };
      img.src = reader.result;
    };
    reader.onerror = function() { reject(new Error("Couldn't read that file")); };
    reader.readAsDataURL(file);
  });
}

var scanToken = 0;

/* Client-side scan rate limit. Caps scans per rolling hour per device to
   stop someone dumping photos and running up API cost. This is a deterrent,
   not airtight security (a determined user can clear storage) — the real
   ceiling lives in the serverless function. */
var SCAN_LIMIT_KEY = "deliver30_scan_log_v1";
var SCAN_MAX_PER_HOUR = 20;

function scanRateOk() {
  try {
    var now = Date.now();
    var hourAgo = now - 3600000;
    var log = JSON.parse(localStorage.getItem(SCAN_LIMIT_KEY) || "[]");
    if (!Array.isArray(log)) log = [];
    log = log.filter(function(ts) { return ts > hourAgo; }); // drop old entries
    if (log.length >= SCAN_MAX_PER_HOUR) {
      localStorage.setItem(SCAN_LIMIT_KEY, JSON.stringify(log));
      return false;
    }
    log.push(now);
    localStorage.setItem(SCAN_LIMIT_KEY, JSON.stringify(log));
    return true;
  } catch (e) {
    return true; // if storage is blocked, don't hard-block the user
  }
}

function attemptScan(base64, kind) {
  return fetch("/.netlify/functions/scan-order", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ image: base64, mediaType: "image/jpeg", kind: kind || "offer" })
  }).then(function(resp) {
    if (!resp.ok) return { ok:false, message:"Couldn't reach the scan service. Try again in a moment.", transient:true };
    return resp.json().then(function(parsed) {
      if (parsed.error) return { ok:false, message:parsed.error, transient:!!parsed.transient };
      return { ok:true, data:parsed };
    });
  }).catch(function() {
    return { ok:false, message:"Couldn't reach the scan service. Try again in a moment.", transient:true };
  });
}

function runScan(file, section, kind, onData) {
  if (!file) return;
  var st = App[section];
  if (st.scanning) return;

  // Rate-limit check before doing any work or making any call.
  if (!scanRateOk()) {
    st.scanError = "You've hit the scan limit for this hour. You can still enter your numbers manually below.";
    if (section === "ov") { st.scanOk = false; if (st.mode) st.mode = "manual"; }
    if (section === "oc") st.mode = "manual";
    render();
    return;
  }

  var myToken = ++scanToken;
  st.scanning = true; st.scanError = null;
  if (section === "oc") st.result = null;
  if (section === "ov") st.scanOk = false;
  render();

  resizeImage(file).then(function(dataUrl) {
    if (myToken !== scanToken) return;
    st.imgPreview = dataUrl;
    var base64 = dataUrl.split(",")[1];
    return attemptScan(base64, kind).then(function(res) {
      if (myToken !== scanToken) return;
      if (!res.ok && res.transient) {
        return new Promise(function(r) { setTimeout(r, 2000); }).then(function() {
          if (myToken !== scanToken) return null;
          return attemptScan(base64, kind);
        });
      }
      return res;
    }).then(function(res) {
      if (myToken !== scanToken || !res) return;
      if (!res.ok) throw new Error(res.message);
      onData(res.data);
    });
  }).catch(function(err) {
    if (myToken !== scanToken) return;
    st.scanError = (err && err.message) ? err.message : "Something went wrong reading that screenshot.";
  }).then(function() {
    if (myToken === scanToken) { st.scanning = false; render(); }
  });
}

function handleScan(file) {
  runScan(file, "oc", "offer", function(data) {
    var p = Number(data.pay) || 0;
    var m = Number(data.miles) || 0;
    var mins = Number(data.minutes) || 0;
    if (!p && !m) throw new Error("Couldn't find payout or mileage \u2014 try a clearer screenshot.");
    App.oc.pay = p ? String(p) : "";
    App.oc.miles = m ? String(m) : "";
    App.oc.minutes = mins ? String(mins) : "";
    App.oc.result = analyzeValues(p, m || 1, mins, App.oc.isEV);
  });
}

function handleOverviewScan(file) {
  runScan(file, "ov", "summary", function(data) {
    var gross = Number(data.gross) || 0;
    var hours = Number(data.hours) || 0;
    if (!gross) throw new Error("Couldn't find your earnings total \u2014 make sure the screenshot shows a daily or weekly total, not a single offer or your account balance.");
    App.ov.gross = String(gross);
    if (hours) App.ov.hours = String(hours);
    var hr = hours > 0 ? gross / hours : 0;
    App.ov.scanWarn = (hr > 150 || (hours > 0 && hr < 2)) ? "That works out to about $" + hr.toFixed(0) + "/hr, which looks off \u2014 the scan may have grabbed the wrong number. Please check it against your screenshot." : null;
    App.ov.scanOk = true;
    saveState();
  });
}

function Totals() {
  var t = computeTotals();
  function periodCard(label, p, accent) {
    var net = p.gross - p.fuel;
    var netHr = p.hours > 0 ? net / p.hours : 0;
    var hasCosts = p.miles > 0 || p.fuel > 0;

  }
  var cards = periodCard("This Week", t.week, C.tealSoft) + periodCard("This Month", t.month, C.amber) + periodCard("This Year", t.year, C.creamDim);
  var recent = t.history.slice().sort(function(a, b) { return b.ts - a.ts; }).slice(0, 14);

    return '<div class="card" style="border-top:3px solid ' + x.color + '"><div class="row-between" style="align-items:flex-start;margin-bottom:12px"><h3 style="font-family:' + FD + ';font-size:20px;color:' + C.cream + '">' + x.name + '</h3>' + pill(x.badge, x.color) + '</div><div style="font-size:12px;color:' + C.sand + ';margin-bottom:2px">' + x.days + '</div><div style="font-size:15px;color:' + C.creamDim + ';font-family:' + FM + ';margin-bottom:12px">' + x.time + '</div>' + ratingBar(x.rating, x.color) + '<div style="margin-top:12px;font-size:13px;color:' + C.muted + ';font-style:italic;line-height:1.6">' + x.note + '</div><button data-shift="' + x.idx + '" style="margin-top:14px;width:100%;padding:11px 16px;border-radius:10px;border:1px solid ' + x.color + '55;background:' + x.color + '12;color:' + x.color + ';font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.04em;text-transform:uppercase">\uD83D\uDCC5 Add to Calendar</button></div>';
  }).join("");
  window._deliver30Shifts = shiftData;

  var avoidData = [
    { time:"2:00 PM \u2013 4:30 PM", reason:"Dead zone \u2014 low volume, poor order quality" },
    { time:"7:00 AM \u2013 9:00 AM", reason:"Breakfast earns less \u2014 low tips, small tickets" }
  ];
  var AVOID = avoidData.map(function(a, i) {
    return '<div style="padding:12px 0;' + (i < avoidData.length-1 ? "border-bottom:1px solid " + C.border : "") + '"><div style="font-size:14px;color:' + C.rustSoft + ';font-family:' + FM + ';margin-bottom:4px">' + a.time + '</div><div style="font-size:13px;color:' + C.muted + '">' + a.reason + '</div></div>';
  }).join("");

  var ALL_DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
  var dayBtns = ALL_DAYS.map(function(d) { return '<button class="day-btn ' + (s.days.indexOf(d) !== -1 ? "active" : "") + '" data-day="' + d + '">' + d + '</button>'; }).join("");
  var hrs = s.days.length * 3.5, projGross = hrs * 35, projNet = hrs * 27;
  var planData = [
    { label:"Peak Hours", value:hrs.toFixed(1) + " hrs" },
    { label:"Est. Gross", value:"$" + projGross.toFixed(0) },
    { label:"Est. Net",   value:"$" + projNet.toFixed(0) }
  ];
  var planStats = planData.map(function(x) { return '<div style="text-align:center"><div class="eyebrow" style="margin-bottom:4px">' + x.label + '</div><div class="bignum" style="font-size:22px;color:' + C.amber + '">' + x.value + '</div></div>'; }).join("");

  var weekBtn = s.days.length ? '<button id="addWeekCal" style="width:100%;margin-top:16px;padding:13px 16px;border-radius:10px;border:none;background:linear-gradient(135deg, ' + C.amberDim + ', ' + C.amber + ');color:#0e0c0a;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.04em;text-transform:uppercase">\uD83D\uDCC5 Add My ' + s.days.length + ' Days to Calendar</button><div style="margin-top:8px;font-size:11px;color:' + C.muted + ';text-align:center;line-height:1.5">Adds recurring dinner-rush blocks (4:30\u20139 PM) for your selected days, with a 15-min reminder.</div>' : '<div style="margin-top:16px;font-size:12px;color:' + C.muted + ';text-align:center">Select days above to add them to your calendar.</div>';

  return pageHead("Peak Hours", "Shift Schedule", "Only three windows are worth your time.") +
    '<div style="display:flex;flex-direction:column;gap:14px;margin-bottom:20px">' + SHIFTS + '</div>' +
    '<div class="card" style="margin-bottom:16px"><div class="eyebrow" style="color:' + C.rust + ';margin-bottom:12px">Windows to Avoid</div>' + AVOID + '</div>' +
    '<div class="card"><div class="eyebrow" style="margin-bottom:14px">Weekly Planner</div><div style="display:flex;gap:' + (mob ? 6 : 8) + 'px;margin-bottom:20px;flex-wrap:wrap">' + dayBtns + '</div><div class="divider" style="margin-bottom:16px"></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">' + planStats + '</div>' + weekBtn + '</div>';
}

/* ── EXPENSES ── */
function Expenses() {
  var e = App.ex;
  var mi = num(e.wkMiles);
  var gasFuel = (mi / num(e.mpg, 1)) * num(e.gasPrice);
  var fastPct = num(e.fastChargePct) / 100;
  var blendedRate = (num(e.elecPrice) * (1 - fastPct)) + (num(e.fastChargePrice) * fastPct);
  var evFuel = (mi / 100) * num(e.kwhPer100) * blendedRate;
  var fuelCost = e.isEV ? evFuel : gasFuel;
  var maint = mi * (e.isEV ? 0.025 : 0.05);
  var tires = mi * (e.isEV ? 0.025 : 0.02);
  var ins = 20;
  var total = fuelCost + maint + tires + ins;
  var cpm = mi > 0 ? total / mi : 0;
  var taxDed = mi * 0.67;

  var inputs = e.isEV ?
    ninput({key:"ex.kwhPer100", label:"kWh per 100 mi", placeholder:"30"}) + ninput({key:"ex.elecPrice", label:"Home Rate ($/kWh)", prefix:"$", placeholder:"0.16"}) + ninput({key:"ex.fastChargePct", label:"% DC Fast Charged", placeholder:"20"}) + ninput({key:"ex.fastChargePrice", label:"Fast Charge ($/kWh)", prefix:"$", placeholder:"0.42"}) + ninput({key:"ex.wkMiles", label:"Weekly Miles", placeholder:"300"})
  :
    ninput({key:"ex.mpg", label:"Vehicle MPG", placeholder:"28"}) + ninput({key:"ex.gasPrice", label:"Gas ($/gal)", prefix:"$", placeholder:"3.50"}) + ninput({key:"ex.wkMiles", label:"Weekly Miles", placeholder:"300"});

  var blendedCard = e.isEV ? '<div class="card" style="margin-bottom:16px;border-color:' + C.teal + '44"><div class="eyebrow" style="color:' + C.tealSoft + '">Blended Electricity Rate</div><div class="bignum" style="font-size:26px;color:' + C.tealSoft + '">$' + blendedRate.toFixed(3) + '/kWh</div><div style="margin-top:6px;font-size:12px;color:' + C.muted + '">' + e.fastChargePct + '% fast-charger use blended with home charging rate</div></div>' : "";

  var bd = [
    { label:e.isEV ? "Electricity" : "Fuel", val:fuelCost },
    { label:"Maintenance Reserve", val:maint },
    { label:"Tire Reserve", val:tires },
    { label:"Insurance Share", val:ins }
  ];
  var breakdown = bd.map(function(b, i) { return '<div><div class="row-between" style="padding:11px 0"><span style="color:' + C.creamDim + ';font-size:15px">' + b.label + '</span><span style="color:' + C.cream + ';font-size:15px;font-family:' + FM + '">$' + b.val.toFixed(2) + '</span></div>' + (i < bd.length-1 ? '<div class="divider"></div>' : "") + '</div>'; }).join("");

  var evNotes = e.isEV ? '<div class="card" style="margin-bottom:16px;border-color:' + C.tealSoft + '33"><div class="eyebrow" style="color:' + C.tealSoft + '">EV Driver Notes</div><div style="font-size:14px;color:' + C.creamDim + ';line-height:1.7">Charge at home overnight whenever possible \u2014 DC fast chargers cost 2\u20133\u00D7 more per kWh. Regenerative braking also means brake pads last far longer than on gas vehicles.</div></div>' : "";

  var ded = ["Mileage deduction \u2014 usually your largest write-off", "Phone bill \u2014 business-use % only", "Phone mount & accessories", "Hot bags & insulated carriers", "Parking & tolls (business only)"];
  if (e.isEV) ded.push("Home charging equipment (business-use %)");
  var deductions = ded.map(function(item) { return '<div class="checklist-item"><div class="checklist-box"><div class="dot"></div></div><span style="font-size:14px;color:' + C.creamDim + ';line-height:1.5">' + item + '</span></div>'; }).join("");

  return pageHead("Vehicle Cost Tracker", "Expenses", "Know your real cost per mile. Gross pay means nothing without it.") +
    toggle({key:"ex.isEV", leftLabel:"Gas", rightLabel:"Electric", leftIcon:"\u26FD", rightIcon:"\u26A1", value:e.isEV}) +
    '<div class="grid2" style="margin-bottom:20px">' + inputs + '</div>' + blendedCard +
    '<div class="card" style="margin-bottom:16px"><div class="eyebrow" style="margin-bottom:14px">Weekly Cost Breakdown</div>' + breakdown + '<div style="margin-top:10px;padding-top:14px;border-top:2px solid ' + C.border + '" class="row-between"><span style="color:' + C.cream + ';font-weight:700">Total Weekly</span><div class="bignum" style="font-size:28px;color:' + C.rustSoft + '">$' + total.toFixed(2) + '</div></div></div>' +
    '<div class="grid2" style="margin-bottom:16px"><div class="card glow"><div class="eyebrow">Cost Per Mile</div><div class="bignum" style="font-size:30px;color:' + (cpm <= (e.isEV ? 0.18 : 0.25) ? C.tealSoft : cpm <= (e.isEV ? 0.28 : 0.35) ? C.amber : C.rustSoft) + '">$' + cpm.toFixed(3) + '</div><div style="margin-top:6px;font-size:12px;color:' + C.muted + '">Target: under $' + (e.isEV ? "0.18" : "0.25") + '</div></div><div class="card"><div class="eyebrow">IRS Mileage Deduction</div><div class="bignum" style="font-size:30px;color:' + C.amber + '">$' + taxDed.toFixed(2) + '</div><div style="margin-top:6px;font-size:12px;color:' + C.muted + '">' + e.wkMiles + ' mi \u00D7 $0.67/mi</div></div></div>' +
    evNotes +
    '<div class="card"><div class="eyebrow" style="margin-bottom:14px">Tax Deduction Checklist</div><div class="checklist">' + deductions + '</div></div>';
}

/* ── CALCULATOR ── */
function Calculator() {
  var c = App.cl;
  var aov = num(c.base) + num(c.tip) + num(c.peakPay);
  var grossHr = num(c.dph) * aov;
  var milesHr = num(c.dph) * num(c.mpd);
  var gasFuelHr = (milesHr / num(c.mpg, 1)) * num(c.gasP);
  var evFuelHr = (milesHr / 100) * num(c.kwhPer100) * num(c.elecPrice);
  var fuelHr = c.isEV ? evFuelHr : gasFuelHr;
  var maintHr = milesHr * (c.isEV ? 0.025 : 0.05);
  var totalExp = fuelHr + maintHr;
  var netHr = grossHr - totalExp;
  var dpm = milesHr > 0 ? grossHr / milesHr : 0;
  var shortfall = Math.max(0, 30 - netHr);
  var neededGross = totalExp + 30;
  var neededAov = num(c.dph) > 0 ? neededGross / num(c.dph) : 0;
  var netColor = netHr >= 30 ? C.tealSoft : netHr >= 20 ? C.amber : C.rustSoft;

  var vehInputs = c.isEV ?
    ninput({key:"cl.kwhPer100", label:"kWh per 100 mi", placeholder:"30"}) + ninput({key:"cl.elecPrice", label:"Electricity ($/kWh)", prefix:"$", placeholder:"0.16"})
  :
    ninput({key:"cl.gasP", label:"Gas Price ($/gal)", prefix:"$", placeholder:"3.50"}) + ninput({key:"cl.mpg", label:"Vehicle MPG", placeholder:"28"});

  var gridData = [
    { label:"Gross / Hour",    value:"$" + grossHr.toFixed(2),  color:C.cream },
    { label:"Expenses / Hour", value:"$" + totalExp.toFixed(2), color:C.rustSoft },
    { label:"Avg Order Value", value:"$" + aov.toFixed(2),      color:C.amber },
    { label:"$/Mile", value:"$" + dpm.toFixed(2), color:dpm >= 2 ? C.tealSoft : C.rustSoft, sub:dpm >= 2 ? "Above minimum" : "Below $2 target" }
  ];
  var grid = gridData.map(function(x) { return '<div class="card"><div class="eyebrow">' + x.label + '</div><div class="bignum" style="font-size:26px;color:' + x.color + '">' + x.value + '</div>' + (x.sub ? '<div style="margin-top:6px;font-size:12px;color:' + C.muted + '">' + x.sub + '</div>' : "") + '</div>'; }).join("");

  var neededData = [
    { label:"Required Gross/Hr",   val:"$" + neededGross.toFixed(2) },
    { label:"Required Avg Order",  val:"$" + neededAov.toFixed(2) },
    { label:"Hourly Vehicle Cost", val:"$" + totalExp.toFixed(2) },
    { label:"Miles Driven/Hr",     val:milesHr.toFixed(1) + " mi" }
  ];
  var needed = neededData.map(function(x, i) { return '<div><div class="row-between" style="padding:11px 0"><span style="color:' + C.muted + ';font-size:14px">' + x.label + '</span><span style="color:' + C.cream + ';font-size:14px;font-family:' + FM + '">' + x.val + '</span></div>' + (i < neededData.length-1 ? '<div class="divider"></div>' : "") + '</div>'; }).join("");

  return pageHead("Earnings Model", "$30/Hr Calculator", "Plug in your averages. See exactly what you need to hit $30 net.") +
    toggle({key:"cl.isEV", leftLabel:"Gas", rightLabel:"Electric", leftIcon:"\u26FD", rightIcon:"\u26A1", value:c.isEV}) +
    '<div class="card" style="margin-bottom:16px"><div class="eyebrow" style="margin-bottom:14px">Delivery Metrics</div><div class="col">' + ninput({key:"cl.dph", label:"Deliveries per Hour", placeholder:"3"}) + ninput({key:"cl.base", label:"Avg Base Pay", prefix:"$", placeholder:"3.50"}) + ninput({key:"cl.tip", label:"Avg Tip", prefix:"$", placeholder:"8.00"}) + ninput({key:"cl.peakPay", label:"Avg Peak Pay per Order", prefix:"$", placeholder:"0.00"}) + ninput({key:"cl.mpd", label:"Avg Miles per Delivery", placeholder:"4"}) + '</div></div>' +
    '<div class="card" style="margin-bottom:16px"><div class="eyebrow" style="margin-bottom:14px">Vehicle Costs</div><div class="col">' + vehInputs + '</div></div>' +
    '<div class="card glow" style="margin-bottom:16px;border-top:3px solid ' + netColor + '"><div class="eyebrow">Net Hourly (after vehicle costs)</div><div class="bignum" style="font-size:' + fitFont("$" + netHr.toFixed(2), 68) + 'px;color:' + netColor + ';word-break:break-all">$' + netHr.toFixed(2) + '</div><div style="margin-top:8px;font-size:14px;color:' + (shortfall > 0 ? C.rust : C.tealSoft) + '">' + (shortfall > 0 ? "$" + shortfall.toFixed(2) + "/hr below $30 target" : "\u2713 Hitting the $30 target") + '</div></div>' +
    '<div class="grid2" style="margin-bottom:16px">' + grid + '</div>' +
    '<div class="card" style="border-color:' + C.amber + '44"><div class="eyebrow" style="margin-bottom:14px">What You Need to Hit $30</div>' + needed + '</div>';
}

/* ── RENDER ── */
var PANELS = [Overview, OrderChecker, Totals, Schedule, Expenses, Calculator];

function render() {
  App.mobile = window.innerWidth < 768;
  var panelHtml = PANELS[App.tab]();
  var root = $("root");
  if (App.mobile) {
    root.innerHTML = '<div class="app"><div class="topbar"><div style="font-family:' + FD + ';font-size:22px;font-weight:800;color:' + C.amber + '">Deliver30</div><div style="font-size:10px;color:' + C.sand + ';margin-left:10px;letter-spacing:0.1em;text-transform:uppercase;margin-top:2px">$30/hr System</div></div><div class="main-mobile"><div class="main-mobile-inner">' + panelHtml + '</div></div><div class="tabbar">' + NAV.map(function(n) { return '<button class="tab-btn ' + (App.tab === n.id ? "active" : "") + '" data-tab="' + n.id + '"><span class="ic">' + n.icon + '</span><span class="lbl">' + n.label + '</span>' + (App.tab === n.id ? '<div class="tab-underline"></div>' : "") + '</button>'; }).join("") + '</div></div>';
  } else {
    root.innerHTML = '<div class="app"><div class="sidebar"><div class="sidebar-brand"><div style="font-family:' + FD + ';font-size:26px;font-weight:800;color:' + C.amber + '">Deliver30</div><div style="font-size:11px;color:' + C.sand + ';letter-spacing:0.1em;text-transform:uppercase;margin-top:2px">$30/hr System</div></div><nav class="sidebar-nav">' + NAV.map(function(n) { return '<button class="nav-btn ' + (App.tab === n.id ? "active" : "") + '" data-tab="' + n.id + '"><span class="ic">' + n.icon + '</span>' + n.label + '</button>'; }).join("") + '</nav><div class="sidebar-foot"><div style="font-size:12px;color:' + C.muted + ';line-height:1.6;font-style:italic">"Treat delivery like a logistics business, not a side gig."</div></div></div><div class="main-desktop"><div class="main-inner">' + panelHtml + '</div></div></div>';
  }
  bindEvents();
}

function bindEvents() {
  var tabs = document.querySelectorAll("[data-tab]");
  for (var i = 0; i < tabs.length; i++) { (function(b) { b.addEventListener("click", function() { App.tab = parseInt(b.getAttribute("data-tab"), 10); render(); }); })(tabs[i]); }

  var inputs = document.querySelectorAll("input[data-key]");
  for (var j = 0; j < inputs.length; j++) { (function(inp) { inp.addEventListener("input", function() { setByKey(inp.getAttribute("data-key"), inp.value); if (App.ov.justLogged) App.ov.justLogged = null; saveState(); liveUpdate(); }); })(inputs[j]); }

  var toggles = document.querySelectorAll("[data-toggle]");
  for (var k = 0; k < toggles.length; k++) { (function(b) { b.addEventListener("click", function() { var key = b.getAttribute("data-toggle"); var bv = b.getAttribute("data-val") === "true"; if (key === "oc.mode") { App.oc.mode = bv ? "manual" : "photo"; App.oc.scanError = null; } else { setByKey(key, bv); if (key === "oc.isEV") App.oc.result = null; } saveState(); render(); }); })(toggles[k]); }

  var tips = document.querySelectorAll("[data-tip]");
  for (var t = 0; t < tips.length; t++) { (function(d) { d.addEventListener("click", function() { App.ov.tipIdx = parseInt(d.getAttribute("data-tip"), 10); render(); }); })(tips[t]); }

  var dayBtns = document.querySelectorAll("[data-day]");
  for (var dd = 0; dd < dayBtns.length; dd++) { (function(b) { b.addEventListener("click", function() { var d = b.getAttribute("data-day"); var idx = App.sc.days.indexOf(d); if (idx !== -1) App.sc.days.splice(idx, 1); else App.sc.days.push(d); saveState(); render(); }); })(dayBtns[dd]); }

  var ab = $("analyzeBtn");
  if (ab) ab.addEventListener("click", function() { var o = App.oc; App.oc.result = analyzeValues(num(o.pay), num(o.miles, 1), num(o.minutes), o.isEV); render(); });

  var si = $("scanInput");
  if (si) si.addEventListener("change", function(e) { var file = e.target.files && e.target.files[0]; if (file) handleScan(file); });

  var ovsi = $("ovScanInput");
  if (ovsi) ovsi.addEventListener("change", function(e) { var file = e.target.files && e.target.files[0]; if (file) handleOverviewScan(file); });

  var logBtn = $("logShiftBtn");
  if (logBtn) logBtn.addEventListener("click", function() { if (logShift("new")) render(); });
  var logAddBtn = $("logAddBtn");
  if (logAddBtn) logAddBtn.addEventListener("click", function() { if (logShift("add")) render(); });
  var logReplaceBtn = $("logReplaceBtn");
  if (logReplaceBtn) logReplaceBtn.addEventListener("click", function() { if (logShift("replace")) render(); });

  var delBtns = document.querySelectorAll("[data-del]");
  for (var db = 0; db < delBtns.length; db++) { (function(b) { b.addEventListener("click", function() { deleteShift(parseInt(b.getAttribute("data-del"), 10)); render(); }); })(delBtns[db]); }

  var modes = document.querySelectorAll("[data-mode]");
  for (var mm = 0; mm < modes.length; mm++) { (function(b) { b.addEventListener("click", function() { App.oc.mode = b.getAttribute("data-mode"); App.oc.scanError = null; render(); }); })(modes[mm]); }

  var shiftBtns = document.querySelectorAll("[data-shift]");
  for (var sb = 0; sb < shiftBtns.length; sb++) { (function(b) { b.addEventListener("click", function() { var shifts = window._deliver30Shifts || []; var x = shifts[parseInt(b.getAttribute("data-shift"), 10)]; if (!x) return; var ics = makeICS(x.name + " (Deliver30)", x.sh, x.sm, x.eh, x.em, x.rrule); downloadICS(ics, x.name.replace(/\s+/g, "-").toLowerCase() + ".ics"); }); })(shiftBtns[sb]); }

  var weekBtn = $("addWeekCal");
  if (weekBtn) weekBtn.addEventListener("click", function() { var map = { Mon:"MO", Tue:"TU", Wed:"WE", Thu:"TH", Fri:"FR", Sat:"SA", Sun:"SU" }; var byday = App.sc.days.map(function(d) { return map[d]; }).filter(Boolean); if (!byday.length) return; var ics = makeICS("Delivery Shift (Deliver30)", 16, 30, 21, 0, byday); downloadICS(ics, "my-delivery-week.ics"); });
}

function liveUpdate() {
  var active = document.activeElement;
  var key = (active && active.getAttribute) ? active.getAttribute("data-key") : null;
  var caret = (active && active.selectionStart != null) ? active.selectionStart : null;
  var panelHtml = PANELS[App.tab]();
  var container = App.mobile ? document.querySelector(".main-mobile-inner") : document.querySelector(".main-inner");
  if (container) {
    container.innerHTML = panelHtml;
    bindEvents();
    if (key) {
      var restored = document.querySelector('input[data-key="' + key + '"]');
      if (restored) { restored.focus(); if (caret != null) { try { restored.setSelectionRange(caret, caret); } catch (e) {} } }
    }
  }
}

window.addEventListener("resize", function() {
  var wasMobile = App.mobile;
  App.mobile = window.innerWidth < 768;
  if (wasMobile !== App.mobile) render();
});

loadState();
render();
</script>
</body>
</html>
