<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Deliver30 — The $30/hr Delivery System</title>
<meta name="description" content="Track your real net hourly rate, check orders before you accept, and plan peak shifts. Built for gig delivery drivers." />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #0e0c0a;
    --surface:   #151210;
    --card:      #1a1714;
    --border:    #2a2520;
    --amber:     #e8a04a;
    --amberSoft: #c47f2e;
    --amberDim:  #7a4e1a;
    --cream:     #f0e6d3;
    --creamDim:  #b8a898;
    --sand:      #8a7a68;
    --rust:      #c4614a;
    --rustSoft:  #e07a62;
    --teal:      #4a8c8a;
    --tealSoft:  #62aaa8;
    --text:      #ede4d8;
    --muted:     #7a6e62;
    --fd: 'Playfair Display', Georgia, serif;
    --fb: 'DM Sans', 'Helvetica Neue', sans-serif;
    --fm: 'DM Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--fb);
    -webkit-font-smoothing: antialiased;
  }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  input[type=number] { -moz-appearance: textfield; }

  button { font-family: var(--fb); -webkit-tap-highlight-color: transparent; }

  .app { min-height: 100vh; }

  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; width: 220px;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; z-index: 100;
  }
  .sidebar-brand { padding: 28px 24px 24px; border-bottom: 1px solid var(--border); }
  .sidebar-nav { flex: 1; padding: 16px 12px; }
  .sidebar-foot { padding: 20px 24px; border-top: 1px solid var(--border); }
  .main-desktop { margin-left: 220px; min-height: 100vh; }
  .main-inner { max-width: 1100px; margin: 0 auto; padding: 48px 40px; }

  .nav-btn {
    width: 100%; display: flex; align-items: center; gap: 12px;
    padding: 11px 14px; border-radius: 10px; border: none; cursor: pointer;
    background: transparent; color: var(--muted);
    font-size: 14px; font-weight: 400; text-align: left; margin-bottom: 4px;
    border-left: 3px solid transparent; transition: all 0.15s;
  }
  .nav-btn .ic { font-size: 16px; }
  .nav-btn.active {
    background: rgba(232,160,74,0.094); color: var(--amber);
    font-weight: 600; border-left: 3px solid var(--amber);
  }

  .topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 54px;
    background: rgba(21,18,16,0.94); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; z-index: 100;
  }
  .main-mobile { padding-top: 54px; padding-bottom: 80px; }
  .main-mobile-inner { padding: 24px 16px; }
  .tabbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(21,18,16,0.97); backdrop-filter: blur(16px);
    border-top: 1px solid var(--border); display: flex; z-index: 100;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .tab-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 10px 4px; border: none; background: transparent;
    color: var(--muted); cursor: pointer; transition: color 0.15s;
  }
  .tab-btn .ic { font-size: 20px; margin-bottom: 3px; }
  .tab-btn .lbl { font-size: 10px; font-weight: 400; letter-spacing: 0.03em; }
  .tab-btn.active { color: var(--amber); }
  .tab-btn.active .lbl { font-weight: 700; }
  .tab-underline { width: 20px; height: 2px; background: var(--amber); border-radius: 1px; margin-top: 4px; }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px;
  }
  .card.glow { border-color: var(--amberDim); box-shadow: 0 0 40px rgba(232,160,74,0.078); }

  .eyebrow {
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--sand); font-weight: 600; margin-bottom: 6px;
  }
  .bignum { font-family: var(--fd); font-weight: 700; line-height: 1; color: var(--amber); }

  .page-eyebrow { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--sand); font-weight: 600; margin-bottom: 10px; }
  .page-title { font-family: var(--fd); font-size: 32px; font-weight: 700; color: var(--cream); line-height: 1.15; letter-spacing: -0.3px; }
  .page-sub { color: var(--muted); font-size: 14px; margin-top: 8px; line-height: 1.6; }
  .page-head { margin-bottom: 28px; }

  .ninput-shell {
    display: flex; align-items: center; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; transition: border-color 0.15s;
  }
  .ninput-shell:focus-within { border-color: var(--amber); background: #1e1b17; }
  .ninput-prefix { color: var(--sand); font-family: var(--fm); font-size: 18px; margin-right: 4px; }
  .ninput-shell input {
    background: transparent; border: none; outline: none; color: var(--cream);
    font-size: 22px; font-family: var(--fm); font-weight: 500; width: 100%; min-width: 0;
    -webkit-appearance: none;
  }

  .divider { height: 1px; background: var(--border); }

  .pill {
    display: inline-block; padding: 3px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
  }

  .toggle {
    display: flex; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 4px; margin-bottom: 20px;
  }
  .toggle-opt {
    flex: 1; padding: 10px 12px; border-radius: 9px; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: transparent; color: var(--muted);
    font-size: 13px; font-weight: 700; transition: all 0.2s;
  }
  .toggle-opt .ic { font-size: 15px; }
  .toggle-opt.active { background: var(--amber); color: var(--bg); }

  .ratingbar { display: flex; gap: 3px; margin-top: 8px; }
  .ratingbar .seg { flex: 1; height: 4px; border-radius: 2px; background: var(--border); }

  .primary-btn {
    width: 100%; padding: 16px 24px;
    background: linear-gradient(135deg, var(--amberDim), var(--amber));
    border: none; border-radius: 14px; color: #0e0c0a;
    font-size: 15px; font-weight: 700; cursor: pointer;
    letter-spacing: 0.06em; text-transform: uppercase;
  }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .col { display: flex; flex-direction: column; gap: 14px; }

  .row-between { display: flex; justify-content: space-between; align-items: center; }

  .checklist { display: flex; flex-direction: column; gap: 1px; background: var(--border); border-radius: 12px; overflow: hidden; }
  .checklist-item { background: var(--card); padding: 14px 16px; display: flex; gap: 12px; align-items: flex-start; }
  .checklist-box { width: 18px; height: 18px; border-radius: 5px; border: 2px solid var(--amberDim); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; }
  .checklist-box .dot { width: 8px; height: 8px; border-radius: 2px; background: var(--amberDim); }

  .day-btn {
    flex: 1 1 auto; padding: 11px 4px; border-radius: 10px;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    font-size: 12px; cursor: pointer; font-weight: 600; transition: all 0.15s;
  }
  .day-btn.active { border-color: var(--amber); background: rgba(232,160,74,0.094); color: var(--amber); }

  .desktop-only { display: block; }
  .mobile-only  { display: none; }
  @media (max-width: 767px) {
    .desktop-only { display: none; }
    .mobile-only  { display: block; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script>
var C = {
  bg:"#0e0c0a", surface:"#151210", card:"#1a1714", border:"#2a2520",
  amber:"#e8a04a", amberSoft:"#c47f2e", amberDim:"#7a4e1a",
  cream:"#f0e6d3", creamDim:"#b8a898", sand:"#8a7a68",
  rust:"#c4614a", rustSoft:"#e07a62", teal:"#4a8c8a", tealSoft:"#62aaa8",
  text:"#ede4d8", muted:"#7a6e62"
};
var FM = "var(--fm)", FD = "var(--fd)", FB = "var(--fb)";

var NAV = [
  { id:0, label:"Overview",  icon:"\u25C8" },
  { id:1, label:"Orders",    icon:"\u2299" },
  { id:2, label:"Schedule",  icon:"\u25F7" },
  { id:3, label:"Expenses",  icon:"\u25CE" },
  { id:4, label:"Calc",      icon:"\u229E" }
];

var TIPS = [
  "Idle time is your biggest enemy \u2014 reposition near restaurants between every drop.",
  "Sit just outside the hotspot. Less competition, same demand.",
  "A bad order doesn't just pay poorly \u2014 it costs you the next good one.",
  "Multi-apping can lift your hourly 30\u201350% by killing dead time.",
  "Friday & Saturday dinner is the best window of the week.",
  "Weekday lunch near office clusters is massively underrated.",
  "Cherry-pick hard. Acceptance rate matters far less than profit per mile."
];

var App = {
  tab: 0,
  mobile: window.innerWidth < 768,
  ov: { gross:"", hours:"", miles:"", fuel:"", orders:"", tipIdx:0 },
  oc: { isEV:false, mode:"photo", pay:"", miles:"", minutes:"", result:null,
        scanning:false, scanError:null, imgPreview:null },
  sc: { days:[] },
  ex: { isEV:false, mpg:"28", gasPrice:"3.50", kwhPer100:"30", elecPrice:"0.16",
        fastChargePct:"20", fastChargePrice:"0.42", wkMiles:"300", depRate:"0.07" },
  cl: { isEV:false, dph:"3", base:"3.50", tip:"8.00", mpd:"4", peakPay:"0",
        gasP:"3.50", mpg:"28", kwhPer100:"30", elecPrice:"0.16", depM:"0.07" }
};

function $(id) { return document.getElementById(id); }
function num(v, d) { d = d || 0; var n = parseFloat(v); return isNaN(n) ? d : Math.max(0, n); }
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function fitFont(str, base) {
  var len = String(str).length;
  if (len <= 8)  return base;
  if (len <= 11) return Math.round(base * 0.7);
  return Math.round(base * 0.5);
}

var STORAGE_KEY = "deliver30_v1";

function saveState() {
  try {
    var snapshot = {
      ov: { gross:App.ov.gross, hours:App.ov.hours, miles:App.ov.miles,
            fuel:App.ov.fuel, orders:App.ov.orders },
      oc: { isEV:App.oc.isEV, mode:App.oc.mode },
      sc: { days:App.sc.days },
      ex: Object.assign({}, App.ex),
      cl: Object.assign({}, App.cl)
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
  } catch (e) { /* storage full or blocked — fail silently */ }
}

function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    var s = JSON.parse(raw);
    if (s.ov) Object.assign(App.ov, s.ov);
    if (s.oc) { App.oc.isEV = !!s.oc.isEV; if (s.oc.mode) App.oc.mode = s.oc.mode; }
    if (s.sc && Array.isArray(s.sc.days)) App.sc.days = s.sc.days;
    if (s.ex) Object.assign(App.ex, s.ex);
    if (s.cl) Object.assign(App.cl, s.cl);
  } catch (e) { /* corrupt data — ignore and start fresh */ }
}

function getByKey(k) { var p = k.split("."); return App[p[0]][p[1]]; }
function setByKey(k, v) { var p = k.split("."); App[p[0]][p[1]] = v; }

function pageHead(eyebrow, title, sub) {
  return '<div class="page-head">' +
    '<div class="page-eyebrow">' + esc(eyebrow) + '</div>' +
    '<h1 class="page-title">' + esc(title) + '</h1>' +
    (sub ? '<p class="page-sub">' + esc(sub) + '</p>' : '') +
  '</div>';
}

function ninput(o) {
  return '<div>' +
    '<div class="eyebrow">' + esc(o.label) + '</div>' +
    '<div class="ninput-shell">' +
      (o.prefix ? '<span class="ninput-prefix">' + o.prefix + '</span>' : '') +
      '<input type="number" inputmode="decimal" data-key="' + o.key + '" placeholder="' +
        (o.placeholder || "0") + '" value="' + esc(getByKey(o.key)) + '" />' +
    '</div>' +
  '</div>';
}

function toggle(o) {
  return '<div class="toggle">' +
    '<button class="toggle-opt ' + (!o.value ? "active" : "") + '" data-toggle="' + o.key + '" data-val="false">' +
      '<span class="ic">' + o.leftIcon + '</span>' + esc(o.leftLabel) +
    '</button>' +
    '<button class="toggle-opt ' + (o.value ? "active" : "") + '" data-toggle="' + o.key + '" data-val="true">' +
      '<span class="ic">' + o.rightIcon + '</span>' + esc(o.rightLabel) +
    '</button>' +
  '</div>';
}

function pill(text, color) {
  return '<span class="pill" style="color:' + color + ';background:' + color + '18;border:1px solid ' + color + '33">' + esc(text) + '</span>';
}

function ratingBar(value, color, max) {
  max = max || 10;
  var segs = "";
  for (var i = 0; i < max; i++) {
    segs += '<div class="seg" style="' + (i < value ? "background:" + color : "") + '"></div>';
  }
  return '<div class="ratingbar">' + segs + '</div>';
}

/* ── OVERVIEW ── */
function Overview() {
  var o = App.ov;
  var g = num(o.gross), h = num(o.hours), m = num(o.miles), f = num(o.fuel), ord = num(o.orders);
  var net = g - f, netHr = h > 0 ? net / h : 0, dpm = m > 0 ? g / m : 0,
      apo = ord > 0 ? g / ord : 0, oph = h > 0 ? ord / h : 0, tax = g * 0.20;
  var tierColor = netHr >= 30 ? C.tealSoft : netHr >= 23 ? C.amber : C.rustSoft;
  var tierLabel = netHr >= 30 ? "Advanced" : netHr >= 23 ? "Intermediate" : "Beginner";
  var pct = Math.max(0, Math.min((netHr / 40) * 100, 100));
  var mob = App.mobile;
  var heroStr = "$" + netHr.toFixed(2);
  var heroSize = fitFont(heroStr, mob ? 56 : 72);

  var statData = [
    { label:"$/Mile",      value:"$" + dpm.toFixed(2), ok:dpm >= 2,   note:"$2.00 min" },
    { label:"Avg/Order",   value:"$" + apo.toFixed(2), ok:apo >= 7,   note:"$7.00 min" },
    { label:"Orders/Hr",   value:oph.toFixed(1),        ok:oph >= 2.5, note:"2.5 target" },
    { label:"Tax Reserve", value:"$" + tax.toFixed(2),  ok:true,       note:"20% of gross", color:C.amber }
  ];
  var stats = statData.map(function(s) {
    return '<div class="card">' +
      '<div class="eyebrow">' + s.label + '</div>' +
      '<div class="bignum" style="font-size:28px;color:' + (s.color || (s.ok ? C.tealSoft : C.rustSoft)) + '">' + s.value + '</div>' +
      '<div style="margin-top:6px;font-size:12px;color:' + (s.ok ? C.tealSoft : C.rust) + '">' + (s.ok ? "\u2713" : "\u2191") + ' ' + s.note + '</div>' +
    '</div>';
  }).join("");

  var dots = TIPS.map(function(_, i) {
    return '<div data-tip="' + i + '" style="width:' + (i === o.tipIdx ? 18 : 6) + 'px;height:6px;border-radius:3px;background:' + (i === o.tipIdx ? C.amber : C.border) + ';cursor:pointer;transition:all 0.3s"></div>';
  }).join("");

  return pageHead("Shift Tracker", "Today's Overview", "Log your shift to see your real net hourly rate after fuel.") +
    '<div style="display:grid;grid-template-columns:' + (mob ? "1fr 1fr" : "repeat(5,1fr)") + ';gap:12px;margin-bottom:20px">' +
      ninput({key:"ov.gross", label:"Gross Earned", prefix:"$", placeholder:"0.00"}) +
      ninput({key:"ov.hours", label:"Hours Online", placeholder:"0.0"}) +
      ninput({key:"ov.miles", label:"Miles Driven", placeholder:"0"}) +
      ninput({key:"ov.fuel", label:"Fuel Cost", prefix:"$", placeholder:"0.00"}) +
      '<div style="' + (mob ? "grid-column:span 2" : "") + '">' + ninput({key:"ov.orders", label:"Orders Done", placeholder:"0"}) + '</div>' +
    '</div>' +

    '<div class="card glow" style="margin-bottom:16px;position:relative;overflow:hidden">' +
      '<div style="position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle, ' + C.amber + '10 0%, transparent 70%);pointer-events:none"></div>' +
      '<div class="eyebrow">Net Hourly Rate</div>' +
      '<div class="bignum" style="font-size:' + heroSize + 'px;color:' + tierColor + ';word-break:break-all">' + heroStr + '</div>' +
      '<div style="margin-top:16px;margin-bottom:8px" class="row-between">' +
        '<span style="font-size:12px;color:' + C.muted + '">$0</span>' +
        pill(tierLabel, tierColor) +
        '<span style="font-size:12px;color:' + C.muted + '">$40/hr</span>' +
      '</div>' +
      '<div style="height:6px;background:' + C.surface + ';border-radius:3px;overflow:hidden">' +
        '<div style="height:100%;width:' + pct + '%;background:linear-gradient(90deg, ' + C.amberDim + ', ' + tierColor + ');border-radius:3px;transition:width 0.6s ease"></div>' +
      '</div>' +
      '<div style="margin-top:14px;font-size:13px;color:' + C.muted + '">' +
        'Net: <span style="color:' + C.cream + '">$' + net.toFixed(2) + '</span> \u00B7 Fuel deducted: <span style="color:' + C.cream + '">$' + f.toFixed(2) + '</span>' +
      '</div>' +
    '</div>' +

    '<div style="display:grid;grid-template-columns:' + (mob ? "1fr 1fr" : "repeat(4,1fr)") + ';gap:12px;margin-bottom:16px">' + stats + '</div>' +

    '<div class="card">' +
      '<div class="eyebrow">Driver Insight</div>' +
      '<div style="font-size:15px;color:' + C.creamDim + ';font-family:' + FD + ';font-style:italic;line-height:1.7">"' + esc(TIPS[o.tipIdx]) + '"</div>' +
      '<div style="margin-top:14px;display:flex;gap:6px">' + dots + '</div>' +
    '</div>';
}

/* ── ORDER CHECKER ── */
function analyzeValues(p, m, mins, isEV) {
  var minDpm = isEV ? 1.7 : 2.0, skipDpm = isEV ? 1.3 : 1.5;
  var dpm = p / (m || 1);
  var hrlyRate = mins > 0 ? p / (mins / 60) : null;
  var verdict, color, reasons = [], positives = [];
  if (dpm >= minDpm && p >= 7 && m <= 6) { verdict = "Accept"; color = C.tealSoft; }
  else if (dpm >= skipDpm)                { verdict = "Borderline"; color = C.amber; }
  else                                    { verdict = "Decline"; color = C.rustSoft; }

  if (dpm < minDpm)  reasons.push("Below the $" + minDpm.toFixed(2) + "/mile rule" + (isEV ? " (EV)" : ""));
  if (dpm < skipDpm) reasons.push("Under $" + skipDpm.toFixed(2) + "/mile \u2014 hard to justify");
  if (p < 7)         reasons.push("Payout under $7 threshold");
  if (m > 6)         reasons.push("Over 6 miles \u2014 hurts your orders per hour");
  if (hrlyRate !== null && hrlyRate < 30) reasons.push("Only ~$" + hrlyRate.toFixed(0) + "/hr at this pace \u2014 below $30 target");

  if (p >= 10 && m <= 5) positives.push("High-value, short distance \u2014 rare find");
  if (dpm >= minDpm)     positives.push("Meets the $" + minDpm.toFixed(2) + "/mile rule");
  if (hrlyRate !== null && hrlyRate >= 30) positives.push("~$" + hrlyRate.toFixed(0) + "/hr at this pace \u2014 hits your target");
  if (isEV && dpm >= skipDpm && dpm < minDpm) positives.push("EV running costs make this more viable than for gas vehicles");

  return { verdict:verdict, color:color, dpm:dpm, hrlyRate:hrlyRate, reasons:reasons, positives:positives };
}

function resizeImage(file) {
  return new Promise(function(resolve, reject) {
    var img = new Image();
    var reader = new FileReader();
    reader.onload = function() {
      img.onload = function() {
        var maxDim = 1024;
        var w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          var scale = maxDim / Math.max(w, h);
          w = Math.round(w * scale);
          h = Math.round(h * scale);
        }
        var canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", 0.82));
      };
      img.onerror = function() { reject(new Error("Couldn't load that image")); };
      img.src = reader.result;
    };
    reader.onerror = function() { reject(new Error("Couldn't read that file")); };
    reader.readAsDataURL(file);
  });
}

var scanToken = 0;

function attemptScan(base64) {
  return fetch("/.netlify/functions/scan-order", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ image: base64, mediaType: "image/jpeg" })
  }).then(function(resp) {
    if (!resp.ok) {
      return { ok:false, message:"Couldn't reach the scan service. Try again in a moment.", transient:true };
    }
    return resp.json().then(function(parsed) {
      if (parsed.error) {
        return { ok:false, message:parsed.error, transient:!!parsed.transient };
      }
      return { ok:true, data:parsed };
    });
  }).catch(function() {
    return { ok:false, message:"Couldn't reach the scan service. Try again in a moment.", transient:true };
  });
}

function handleScan(file) {
  if (!file) return;
  if (App.oc.scanning) return;
  var myToken = ++scanToken;
  App.oc.scanning = true;
  App.oc.scanError = null;
  App.oc.result = null;
  render();

  resizeImage(file).then(function(dataUrl) {
    if (myToken !== scanToken) return;
    App.oc.imgPreview = dataUrl;
    var base64 = dataUrl.split(",")[1];

    return attemptScan(base64).then(function(res) {
      if (myToken !== scanToken) return;
      if (!res.ok && res.transient) {
        return new Promise(function(r) { setTimeout(r, 2000); }).then(function() {
          if (myToken !== scanToken) return null;
          return attemptScan(base64);
        });
      }
      return res;
    }).then(function(res) {
      if (myToken !== scanToken || !res) return;
      if (!res.ok) throw new Error(res.message);

      var p = Number(res.data.pay) || 0;
      var m = Number(res.data.miles) || 0;
      var mins = Number(res.data.minutes) || 0;
      if (!p && !m) throw new Error("Couldn't find payout or mileage \u2014 try a clearer screenshot.");

      App.oc.pay     = p    ? String(p)    : "";
      App.oc.miles   = m    ? String(m)    : "";
      App.oc.minutes = mins ? String(mins) : "";
      App.oc.result  = analyzeValues(p, m || 1, mins, App.oc.isEV);
    });
  }).catch(function(err) {
    if (myToken !== scanToken) return;
    App.oc.scanError = (err && err.message) ? err.message : "Something went wrong reading that screenshot.";
  }).then(function() {
    if (myToken === scanToken) {
      App.oc.scanning = false;
      render();
    }
  });
}

/* ── CALCULATOR ── */
function Calculator() {
  var c = App.cl;
  var aov = num(c.base) + num(c.tip) + num(c.peakPay);
  var grossHr = num(c.dph) * aov;
  var milesHr = num(c.dph) * num(c.mpd);
  var gasFuelHr = (milesHr / num(c.mpg, 1)) * num(c.gasP);
  var evFuelHr = (milesHr / 100) * num(c.kwhPer100) * num(c.elecPrice);
  var fuelHr = c.isEV ? evFuelHr : gasFuelHr;
  var depHr = milesHr * num(c.depM);
  var maintHr = milesHr * (c.isEV ? 0.025 : 0.05);
  var totalExp = fuelHr + depHr + maintHr;
  var netHr = grossHr - totalExp;
  var dpm = milesHr > 0 ? grossHr / milesHr : 0;
  var shortfall = Math.max(0, 30 - netHr);
  var neededGross = totalExp + 30;
  var neededAov = num(c.dph) > 0 ? neededGross / num(c.dph) : 0;
  var netColor = netHr >= 30 ? C.tealSoft : netHr >= 20 ? C.amber : C.rustSoft;

  var vehInputs = c.isEV ?
    ninput({key:"cl.kwhPer100", label:"kWh per 100 mi", placeholder:"30"}) +
    ninput({key:"cl.elecPrice", label:"Electricity ($/kWh)", prefix:"$", placeholder:"0.16"}) +
    ninput({key:"cl.depM", label:"Depreciation ($/mi)", prefix:"$", placeholder:"0.07"})
  :
    ninput({key:"cl.gasP", label:"Gas Price ($/gal)", prefix:"$", placeholder:"3.50"}) +
    ninput({key:"cl.mpg", label:"Vehicle MPG", placeholder:"28"}) +
    ninput({key:"cl.depM", label:"Depreciation ($/mi)", prefix:"$", placeholder:"0.07"});

  var gridData = [
    { label:"Gross / Hour",    value:"$" + grossHr.toFixed(2),  color:C.cream },
    { label:"Expenses / Hour", value:"$" + totalExp.toFixed(2), color:C.rustSoft },
    { label:"Avg Order Value", value:"$" + aov.toFixed(2),      color:C.amber },
    { label:"$/Mile", value:"$" + dpm.toFixed(2), color:dpm >= 2 ? C.tealSoft : C.rustSoft, sub:dpm >= 2 ? "Above minimum" : "Below $2 target" }
  ];
  var grid = gridData.map(function(x) {
    return '<div class="card">' +
      '<div class="eyebrow">' + x.label + '</div>' +
      '<div class="bignum" style="font-size:26px;color:' + x.color + '">' + x.value + '</div>' +
      (x.sub ? '<div style="margin-top:6px;font-size:12px;color:' + C.muted + '">' + x.sub + '</div>' : "") +
    '</div>';
  }).join("");

  var neededData = [
    { label:"Required Gross/Hr",   val:"$" + neededGross.toFixed(2) },
    { label:"Required Avg Order",  val:"$" + neededAov.toFixed(2) },
    { label:"Hourly Vehicle Cost", val:"$" + totalExp.toFixed(2) },
    { label:"Miles Driven/Hr",     val:milesHr.toFixed(1) + " mi" }
  ];
  var needed = neededData.map(function(x, i) {
    return '<div>' +
      '<div class="row-between" style="padding:11px 0">' +
        '<span style="color:' + C.muted + ';font-size:14px">' + x.label + '</span>' +
        '<span style="color:' + C.cream + ';font-size:14px;font-family:' + FM + '">' + x.val + '</span>' +
      '</div>' +
      (i < neededData.length - 1 ? '<div class="divider"></div>' : "") +
    '</div>';
  }).join("");

  return pageHead("Earnings Model", "$30/Hr Calculator", "Plug in your averages. See exactly what you need to hit $30 net.") +
    toggle({key:"cl.isEV", leftLabel:"Gas", rightLabel:"Electric", leftIcon:"\u26FD", rightIcon:"\u26A1", value:c.isEV}) +
    '<div class="card" style="margin-bottom:16px">' +
      '<div class="eyebrow" style="margin-bottom:14px">Delivery Metrics</div>' +
      '<div class="col">' +
        ninput({key:"cl.dph", label:"Deliveries per Hour", placeholder:"3"}) +
        ninput({key:"cl.base", label:"Avg Base Pay", prefix:"$", placeholder:"3.50"}) +
        ninput({key:"cl.tip", label:"Avg Tip", prefix:"$", placeholder:"8.00"}) +
        ninput({key:"cl.peakPay", label:"Avg Peak Pay per Order", prefix:"$", placeholder:"0.00"}) +
        ninput({key:"cl.mpd", label:"Avg Miles per Delivery", placeholder:"4"}) +
      '</div>' +
    '</div>' +
    '<div class="card" style="margin-bottom:16px">' +
      '<div class="eyebrow" style="margin-bottom:14px">Vehicle Costs</div>' +
      '<div class="col">' + vehInputs + '</div>' +
    '</div>' +
    '<div class="card glow" style="margin-bottom:16px;border-top:3px solid ' + netColor + '">' +
      '<div class="eyebrow">Net Hourly (after vehicle costs)</div>' +
      '<div class="bignum" style="font-size:' + fitFont("$" + netHr.toFixed(2), 68) + 'px;color:' + netColor + ';word-break:break-all">$' + netHr.toFixed(2) + '</div>' +
      '<div style="margin-top:8px;font-size:14px;color:' + (shortfall > 0 ? C.rust : C.tealSoft) + '">' + (shortfall > 0 ? "$" + shortfall.toFixed(2) + "/hr below $30 target" : "\u2713 Hitting the $30 target") + '</div>' +
    '</div>' +
    '<div class="grid2" style="margin-bottom:16px">' + grid + '</div>' +
    '<div class="card" style="border-color:' + C.amber + '44">' +
      '<div class="eyebrow" style="margin-bottom:14px">What You Need to Hit $30</div>' + needed +
    '</div>';
}

/* ── RENDER ── */
var PANELS = [Overview, OrderChecker, Schedule, Expenses, Calculator];

function render() {
  App.mobile = window.innerWidth < 768;
  var panelHtml = PANELS[App.tab]();
  var root = $("root");

  if (App.mobile) {
    root.innerHTML =
      '<div class="app">' +
        '<div class="topbar">' +
          '<div style="font-family:' + FD + ';font-size:22px;font-weight:800;color:' + C.amber + '">Deliver30</div>' +
          '<div style="font-size:10px;color:' + C.sand + ';margin-left:10px;letter-spacing:0.1em;text-transform:uppercase;margin-top:2px">$30/hr System</div>' +
        '</div>' +
        '<div class="main-mobile"><div class="main-mobile-inner">' + panelHtml + '</div></div>' +
        '<div class="tabbar">' +
          NAV.map(function(n) {
            return '<button class="tab-btn ' + (App.tab === n.id ? "active" : "") + '" data-tab="' + n.id + '">' +
              '<span class="ic">' + n.icon + '</span>' +
              '<span class="lbl">' + n.label + '</span>' +
              (App.tab === n.id ? '<div class="tab-underline"></div>' : "") +
            '</button>';
          }).join("") +
        '</div>' +
      '</div>';
  } else {
    root.innerHTML =
      '<div class="app">' +
        '<div class="sidebar">' +
          '<div class="sidebar-brand">' +
            '<div style="font-family:' + FD + ';font-size:26px;font-weight:800;color:' + C.amber + '">Deliver30</div>' +
            '<div style="font-size:11px;color:' + C.sand + ';letter-spacing:0.1em;text-transform:uppercase;margin-top:2px">$30/hr System</div>' +
          '</div>' +
          '<nav class="sidebar-nav">' +
            NAV.map(function(n) {
              return '<button class="nav-btn ' + (App.tab === n.id ? "active" : "") + '" data-tab="' + n.id + '">' +
                '<span class="ic">' + n.icon + '</span>' + n.label +
              '</button>';
            }).join("") +
          '</nav>' +
          '<div class="sidebar-foot">' +
            '<div style="font-size:12px;color:' + C.muted + ';line-height:1.6;font-style:italic">"Treat delivery like a logistics business, not a side gig."</div>' +
          '</div>' +
        '</div>' +
        '<div class="main-desktop"><div class="main-inner">' + panelHtml + '</div></div>' +
      '</div>';
  }

  bindEvents();
}

function bindEvents() {
  var tabs = document.querySelectorAll("[data-tab]");
  for (var i = 0; i < tabs.length; i++) {
    (function(btn) {
      btn.addEventListener("click", function() { App.tab = parseInt(btn.getAttribute("data-tab"), 10); render(); });
    })(tabs[i]);
  }

  var inputs = document.querySelectorAll("input[data-key]");
  for (var j = 0; j < inputs.length; j++) {
    (function(inp) {
      inp.addEventListener("input", function() {
        setByKey(inp.getAttribute("data-key"), inp.value);
        saveState();
        liveUpdate();
      });
    })(inputs[j]);
  }

  var toggles = document.querySelectorAll("[data-toggle]");
  for (var k = 0; k < toggles.length; k++) {
    (function(btn) {
      btn.addEventListener("click", function() {
        var key = btn.getAttribute("data-toggle");
        var boolVal = btn.getAttribute("data-val") === "true";
        if (key === "oc.mode") {
          App.oc.mode = boolVal ? "manual" : "photo";
          App.oc.scanError = null;
        } else {
          setByKey(key, boolVal);
          if (key === "oc.isEV") App.oc.result = null;
        }
        saveState();
        render();
      });
    })(toggles[k]);
  }

  var tips = document.querySelectorAll("[data-tip]");
  for (var t = 0; t < tips.length; t++) {
    (function(d) {
      d.addEventListener("click", function() { App.ov.tipIdx = parseInt(d.getAttribute("data-tip"), 10); render(); });
    })(tips[t]);
  }

  var dayBtns = document.querySelectorAll("[data-day]");
  for (var dd = 0; dd < dayBtns.length; dd++) {
    (function(b) {
      b.addEventListener("click", function() {
        var d = b.getAttribute("data-day");
        var idx = App.sc.days.indexOf(d);
        if (idx !== -1) App.sc.days.splice(idx, 1);
        else App.sc.days.push(d);
        saveState();
        render();
      });
    })(dayBtns[dd]);
  }

  var ab = $("analyzeBtn");
  if (ab) ab.addEventListener("click", function() {
    var o = App.oc;
    App.oc.result = analyzeValues(num(o.pay), num(o.miles, 1), num(o.minutes), o.isEV);
    render();
  });

  var si = $("scanInput");
  if (si) si.addEventListener("change", function(e) {
    var file = e.target.files && e.target.files[0];
    if (file) handleScan(file);
  });

  var modes = document.querySelectorAll("[data-mode]");
  for (var mm = 0; mm < modes.length; mm++) {
    (function(b) {
      b.addEventListener("click", function() {
        App.oc.mode = b.getAttribute("data-mode");
        App.oc.scanError = null;
        render();
      });
    })(modes[mm]);
  }
}

function liveUpdate() {
  var active = document.activeElement;
  var key = (active && active.getAttribute) ? active.getAttribute("data-key") : null;
  var caret = (active && active.selectionStart != null) ? active.selectionStart : null;

  var panelHtml = PANELS[App.tab]();
  var container = App.mobile ? document.querySelector(".main-mobile-inner") : document.querySelector(".main-inner");
  if (container) {
    container.innerHTML = panelHtml;
    bindEvents();
    if (key) {
      var restored = document.querySelector('input[data-key="' + key + '"]');
      if (restored) {
        restored.focus();
        if (caret != null) { try { restored.setSelectionRange(caret, caret); } catch (e) {} }
      }
    }
  }
}

window.addEventListener("resize", function() {
  var wasMobile = App.mobile;
  App.mobile = window.innerWidth < 768;
  if (wasMobile !== App.mobile) render();
});

loadState();
render();
</script>
</body>
</html>
